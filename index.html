<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quick Fire Trivia</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <main id="game">
            <header>
                <h1 id="game-title">Quick Fire Trivia</h1>
                <div id="score-display">Score: <span id="score">0</span></div>
            </header>

            <section id="question-card">
                <p id="question-number">Question 1 of 5</p>
                <h2 id="question-text">Who invented the World Wide Web?</h2>
                <ul id="answer-list">
                    <li><button class="answer-btn">Tim Berners-Lee</button></li>
                    <li><button class="answer-btn">Bill Gates</button></li>
                    <li><button class="answer-btn">Linus Torvalds</button></li>
                    <li><button class="answer-btn">Ada Lovelace</button></li>
                </ul>
                <button id="next-btn" class="hidden">Next Question →</button>
            </section>

            <section id="end-screen" class="hidden"></section>
        </main>
    </body>
</html>
